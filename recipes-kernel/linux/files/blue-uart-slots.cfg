# BeagleBone Blue UART slot fix
#
# The AM335x has 6 UARTs (UART0-5). The default kernel config only allocates
# 5 8250 port slots (NR_UARTS=5). On the Blue, the l4_wkup bus (hosting UART0)
# initialises last, so UART1-5 fill all 5 slots first, leaving UART0 with
# nowhere to register → "unable to register 8250 port" → no debug console.
#
# Raising the limit to 6 gives UART0 its slot.
CONFIG_SERIAL_8250_NR_UARTS=6
CONFIG_SERIAL_8250_RUNTIME_UARTS=6
