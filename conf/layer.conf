# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-blue-bsp"
BBFILE_PATTERN_meta-blue-bsp = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-blue-bsp = "6"

LAYERDEPENDS_meta-blue-bsp = "core meta-arm meta-ti-bsp"
LAYERSERIES_COMPAT_meta-blue-bsp = "whinlatter scarthgap"
